q6a_laser_odom:
  ros__parameters:
    odom_frame: odom
    base_frame: base_link
    # laser_frame removed (A4): base_link->laser is now owned by robot_state_publisher from the URDF
    # publish_tf false (A4-followup): the robot_localization EKF owns odom->base_link now; this node
    # only publishes /odom_laser as a scan-matched reference (avoids two-parents-for-base_link, G27).
    publish_tf: false
    odom_topic: /odom_laser
    icp_iters: 14
    icp_max_corr: 0.35
    min_pts: 18
    max_step_xy: 0.15
    max_step_th: 0.15
    # sign flips validated by driving forward and confirming +x - do not change without re-verifying
    sign_x: 1.0
    sign_y: 1.0
    sign_th: 1.0
