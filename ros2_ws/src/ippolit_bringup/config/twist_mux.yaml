twist_mux:
  ros__parameters:
    # G23: twist_mux (this ros-jazzy-twist-mux version) defaults use_stamped to true if not
    # declared, meaning it expects/publishes geometry_msgs/TwistStamped everywhere - silently
    # type-mismatching cliff_guard's and cmd_vel_bridge's plain geometry_msgs/Twist (zero data
    # flow, no error, no crash - only found by inspecting `ros2 topic type` and noticing two
    # types on one topic name). Force it off to match this project's plain-Twist design.
    use_stamped: false
    topics:
      safety:
        topic: /cmd_vel_safety
        timeout: 0.5
        priority: 100
      teleop:
        topic: /cmd_vel_teleop
        timeout: 0.5
        priority: 50
      nav:
        # Not wired up until F4 (Nav2 bringup) - harmless to declare now, twist_mux just never
        # sees anything published on this topic until then.
        topic: /cmd_vel_nav
        timeout: 0.5
        priority: 10
    # No locks configured (empty "locks: {}" crashes twist_mux at startup with
    # "parameter_value_from failed for parameter 'locks': No parameter value set" - it needs
    # the key omitted entirely, not present-but-empty).
